include:
  - "_variables.yml"

variables:
  GIT_SSL_NO_VERIFY: "1"
  
image: gitlab-registry.insee.fr/datascience/registry-qf/onyxia-rstudio:r4.1.3

pages:
  tags :
   - docker

  script:
  - echo 'couleur du format choisie :'
  - echo $COULEURFORMAT
  - echo 'Deploy presentation to Gitlab pages'
  - Rscript -e 'install.packages(c("jsonlite", "htmltools", "digest", "knitr", "rmarkdown", "dplyr", "DT", "plotly"))'
  
#Pour modifier le format sur gitlab, modifier la valeur de cette variable dans le fichier _variables.yml
  - quarto render --to insee-$COULEURFORMAT-revealjs --execute-params params.yml
  
  - mkdir -p public # on cree le repertoire public
  - mv _output/* public/ # on copie les repertoires img et css (et leurs ss-rep) dans public
  artifacts:
    paths:
      - public
  only:
    - main
